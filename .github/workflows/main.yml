name: Build
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Install Rust
        run: rustup update stable && rustup default stable
 
      - name: Build release
        run: cargo build --release
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
